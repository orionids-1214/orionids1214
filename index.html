<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 레시피 추출기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-utensils"></i> YouTube 레시피 추출기</h1>
            <p>YouTube 영상 URL을 붙여넣고 레시피를 추출하세요.</p>
        </header>
        <main>
            <form id="recipe-form">
                <div class="input-group">
                    <i class="fas fa-link"></i>
                    <input type="url" id="youtube-url" placeholder="YouTube URL을 여기에 붙여넣으세요..." required>
                </div>
                <button type="submit" id="extract-button">
                    <span class="button-text">레시피 추출</span>
                    <span class="loading-spinner" style="display: none;"></span>
                </button>
            </form>
            <div id="recipe-display" aria-live="polite">
                <!-- 추출된 레시피가 여기에 표시됩니다. -->
            </div>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
